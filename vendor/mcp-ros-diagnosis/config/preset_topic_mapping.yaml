# Robot-side mapping: preset -> traditional ROS2 publishes
# This node subscribes to /manastone/motion_control/preset (std_msgs/String)
# and executes publishes defined below.

presets:
  stop:
    publish:
      - topic: /cmd_vel
        type: geometry_msgs/msg/Twist
        msg:
          linear: {x: 0.0, y: 0.0, z: 0.0}
          angular: {x: 0.0, y: 0.0, z: 0.0}

  heart_hands:
    publish:
      - topic: /gesture
        type: std_msgs/msg/String
        msg:
          data: heart_hands
